<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sr. Campero - Menú Interactivos</title>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@700;900&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0d0d0d;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            overflow: hidden;
        }
        /* Contenedor tipo scroll vertical bloqueado */
        .feed-container {
            width: 100vw;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }
        /* Cada platillo ocupa toda la pantalla */
        .product-section {
            width: 100vw;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            background-size: cover;
            background-position: center;
        }
        /* Sombra oscura inferior para que el texto sea legible */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.2) 100%);
            z-index: 1;
        }
        /* Información del Producto */
        .product-info {
            position: relative;
            z-index: 2;
            padding: 30px 80px 40px 20px; /* Espacio para botones laterales */
        }
        .product-info h2 {
            font-family: 'Urbanist', sans-serif;
            font-size: 32px;
            color: #fff;
            margin-bottom: 8px;
        }
        .product-info .desc {
            font-size: 15px;
            color: #ccc;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .product-info .price {
            font-size: 26px;
            font-weight: bold;
            color: #ffaa00;
        }
        /* Panel Lateral de Botones (Estilo Red Social) */
        .side-actions {
            position: absolute;
            right: 15px;
            bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 3;
            align-items: center;
        }
        .action-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .action-btn:active { transform: scale(0.9); }
        .btn-like { background: rgba(255, 255, 255, 0.15); color: #fff; backdrop-filter: blur(5px); }
        .btn-like.liked { color: #ff3b30; }
        .btn-order { background: #25d366; color: white; font-size: 24px; }
        .action-counter { font-size: 12px; color: #fff; margin-top: 4px; font-weight: 600; }
        
        /* Banner superior discreto de la marca */
        .brand-header {
            position: absolute;
            top: 15px; left: 15px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }
        .brand-header h1 { font-family: 'Urbanist', sans-serif; font-size: 18px; color: #ff5500; letter-spacing: 1px; }
        .badge-pickup { font-size: 11px; background: #ffaa00; color: #000; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="brand-header">
        <img src="/static/images/logo.png" alt="Logo Sr. Campero" style="width: 100px; height: 100px; object-fit: contain; vertical-align: middle;">
        <span class="badge-pickup">PARA LLEVAR</span>
    </div>

    <div class="feed-container">
        {% for p in productos %}
        <div class="product-section" style="background-image: url('/static/images/{{ p.imagen_url }}'); background-color: #1a1a1a;">
            <div class="overlay"></div>
            
            <div class="product-info">
                <h2>{{ p.nombre }}</h2>
                <p class="desc">{{ p.descripcion }}</p>
                <p class="price">${{ "%0.2f" | format(p.precio) }}</p>
            </div>

            <div class="side-actions">
                <div>
                    <button class="action-btn btn-like" onclick="likeProducto({{ p.id }}, this)">❤️</button>
                    <p class="action-counter" id="likes-{{ p.id }}">{{ p.likes }}</p>
                </div>
                <a href="/pedir/{{ p.id }}" class="action-btn btn-order">🛒</a>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        // Función interactiva para enviar likes en tiempo real
        function likeProducto(id, btn) {
            fetch('/like/' + id, { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if(data.success) {
                    document.getElementById('likes-' + id).innerText = data.likes;
                    btn.classList.add('liked');
                    btn.style.transform = "scale(1.2)";
                    setTimeout(() => btn.style.transform = "scale(1)", 200);
                }
            });
        }
    </script>
</body>
</html>
